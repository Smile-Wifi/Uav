<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delta-Wing UAV 3D Viewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #0a0a0a;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    
    #uav-container {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }
    
    #uav-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    
    .info-panel {
      position: absolute;
      top: 16px;
      left: 16px;
      color: #fff;
      font-size: 13px;
      opacity: 0.7;
      pointer-events: none;
      user-select: none;
    }
    
    .info-panel .title {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }
    
    .controls {
      position: absolute;
      bottom: 16px;
      right: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .controls button {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-family: system-ui, -apple-system, sans-serif;
      backdrop-filter: blur(10px);
      transition: all 0.2s ease;
      outline: none;
    }
    
    .controls button:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.4);
    }
    
    .controls button.active-blue {
      background: rgba(100, 200, 255, 0.2);
      border-color: rgba(100, 200, 255, 0.5);
      color: #64c8ff;
    }
    
    .controls button.active-orange {
      background: rgba(255, 140, 0, 0.2);
      border-color: rgba(255, 140, 0, 0.4);
      color: #ff8c00;
    }
    
    .controls button.inactive {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.15);
      color: #666;
    }
    
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 14px;
      opacity: 0.5;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="uav-container">
    <canvas id="uav-canvas"></canvas>
    <div class="loading" id="loading">Loading 3D Engine...</div>
    
    <div class="info-panel">
      <div class="title">Delta-Wing UAV</div>
      <div>Drag to rotate &bull; Scroll to zoom</div>
    </div>
    
    <div class="controls">
      <button id="btn-wireframe">Wireframe</button>
      <button id="btn-afterburner" class="active-orange">Afterburner: ON</button>
      <button id="btn-auto" class="active-blue">Auto Rotate</button>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // Hide loading text
    document.getElementById('loading').style.display = 'none';

    const container = document.getElementById('uav-container');
    const canvas = document.getElementById('uav-canvas');

    // ========== SCENE ==========
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);

    // ========== CAMERA ==========
    const camera = new THREE.PerspectiveCamera(
      45,
      container.clientWidth / container.clientHeight,
      0.1,
      1000
    );
    camera.position.set(6, 3, 8);

    // ========== RENDERER ==========
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    // ========== CONTROLS ==========
    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 3;
    controls.maxDistance = 20;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.5;

    // ========== LIGHTING ==========
    const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
    scene.add(ambientLight);

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(5, 8, 5);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.width = 2048;
    keyLight.shadow.mapSize.height = 2048;
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0x8899aa, 0.5);
    fillLight.position.set(-5, 3, -5);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0x445566, 0.4);
    rimLight.position.set(0, -3, -8);
    scene.add(rimLight);

    // ========== MATERIALS ==========
    const fuselageMat = new THREE.MeshStandardMaterial({
      color: 0x888899,
      roughness: 0.5,
      metalness: 0.3,
    });

    const darkMat = new THREE.MeshStandardMaterial({
      color: 0x555566,
      roughness: 0.6,
      metalness: 0.2,
    });

    const engineMat = new THREE.MeshStandardMaterial({
      color: 0x666677,
      roughness: 0.3,
      metalness: 0.7,
    });

    const intakeMat = new THREE.MeshStandardMaterial({
      color: 0x111111,
      roughness: 0.8,
      metalness: 0.1,
    });

    // ========== BUILD UAV ==========
    const uav = new THREE.Group();
    scene.add(uav);

    // ---- FUSELAGE / NOSE ----
    const fuselageGeo = new THREE.CapsuleGeometry(0.45, 2.8, 8, 16);
    const fuselage = new THREE.Mesh(fuselageGeo, fuselageMat);
    fuselage.rotation.z = Math.PI / 2;
    fuselage.position.set(-0.3, 0, 0);
    fuselage.scale.set(1, 0.7, 0.85);
    fuselage.castShadow = true;
    uav.add(fuselage);

    // Nose cone
    const noseGeo = new THREE.SphereGeometry(0.42, 16, 16);
    const nose = new THREE.Mesh(noseGeo, fuselageMat);
    nose.position.set(-1.85, 0, 0);
    nose.scale.set(1.1, 0.65, 0.8);
    nose.castShadow = true;
    uav.add(nose);

    // Nose tip
    const noseTipGeo = new THREE.SphereGeometry(0.15, 12, 12);
    const noseTip = new THREE.Mesh(noseTipGeo, fuselageMat);
    noseTip.position.set(-2.15, 0, 0);
    noseTip.scale.set(1, 0.6, 0.7);
    uav.add(noseTip);

    // Intake opening (front)
    const intakeGeo = new THREE.CylinderGeometry(0.22, 0.28, 0.4, 16, 1, true);
    const intake = new THREE.Mesh(intakeGeo, intakeMat);
    intake.rotation.z = Math.PI / 2;
    intake.position.set(-1.6, -0.05, 0);
    intake.castShadow = true;
    uav.add(intake);

    // Intake lip
    const intakeLipGeo = new THREE.TorusGeometry(0.25, 0.03, 8, 16);
    const intakeLip = new THREE.Mesh(intakeLipGeo, engineMat);
    intakeLip.rotation.y = Math.PI / 2;
    intakeLip.position.set(-1.8, -0.05, 0);
    uav.add(intakeLip);

    // ---- DELTA WING ----
    const wingShapeShape = new = new THREE.Shape();
    wingShape.moveTo(0, 0);
    wingShape.lineTo(2.2, 2.8);
    wingShape.lineTo(2.8, 2.6);
    wingShape.lineTo(2.8, -2.6);
    wingShape.lineTo(2.2, -2.8);
    wingShape.lineTo(0, 0);

    const wingExtrudeSettings = {
      steps: 1,
      depth: 0.08,
      bevelEnabled: true,
      bevelThickness: 0.02,
      bevelSize: 0.02,
      bevelSegments: 2
    };

    const wingGeo = new THREE.ExtrudeGeometry(wingShape, wingExtrudeSettings);
    const wing = new THREE.Mesh(wingGeo, fuselageMat);
    wing.rotation.y = Math.PI / 2;
    wing.rotation.x = Math.PI / 2;
    wing.position.set(-0.8, -0.15, 0);
    wing.castShadow = true;
    wing.receiveShadow = true;
    uav.add(wing);

    // Wing root fairing
    const wingRootGeo = new THREE.CylinderGeometry(0.5, 0.35, 1.2, 12);
    const wingRoot = new THREE.Mesh(wingRootGeo, fuselageMat);
    wingRoot.rotation.z = Math.PI / 2;
    wingRoot.position.set(-0.2, -0.1, 0);
    wingRoot.scale.set(1, 0.5, 1.3);
    wingRoot.castShadow = true;
    uav.add(wingRoot);

    // ---- VERTICAL STABILIZERS (V-Tail) ----
    const vStabShape = new THREE.Shape();
    vStabShape.moveTo(0, 0);
    vStabShape.lineTo(0.6, 0);
    vStabShape.lineTo(0.3, 1.1);
    vStabShape.lineTo(-0.1, 1.0);
    vStabShape.lineTo(0, 0);

    const vStabGeo = new THREE.ExtrudeGeometry(vStabShape, {
      depth: 0.06,
      bevelEnabled: true,
      bevelThickness: 0.01,
      bevelSize: 0.01,
      bevelSegments: 1
    });

    const leftVStab = new THREE.Mesh(vStabGeo, fuselageMat);
    leftVStab.position.set(2.2, 0.1, 0.35);
    leftVStab.rotation.y = -0.15;
    leftVStab.rotation.z = -0.05;
    leftVStab.castShadow = true;
    uav.add(leftVStab);

    const rightVStab = new THREE.Mesh(vStabGeo, fuselageMat);
    rightVStab.position.set(2.2, 0.1, -0.35);
    rightVStab.rotation.y = 0.15;
    rightVStab.rotation.z = -0.05;
    rightVStab.scale.z = -1;
    rightVStab.castShadow = true;
    uav.add(rightVStab);

    // ---- ENGINE / EXHAUST ----
    const engineGeo = new THREE.CylinderGeometry(0.2, 0.28, 0.8, 16);
    const engine = new THREE.Mesh(engineGeo, engineMat);
    engine.rotation.z = Math.PI / 2;
    engine.position.set(2.6, 0.05, 0);
    engine.castShadow = true;
    uav.add(engine);

    // Exhaust nozzle
    const nozzleGeo = new THREE.CylinderGeometry(0.18, 0.22, 0.3, 16, 1, true);
    const nozzle = new THREE.Mesh(nozzleGeo, engineMat);
    nozzle.rotation.z = Math.PI / 2;
    nozzle.position.set(3.05, 0.05, 0);
    nozzle.castShadow = true;
    uav.add(nozzle);

    // Exhaust interior
    const exhaustInnerGeo = new THREE.CylinderGeometry(0.16, 0.18, 0.1, 16);
    const exhaustInner = new THREE.Mesh(exhaustInnerGeo, intakeMat);
    exhaustInner.rotation.z = Math.PI / 2;
    exhaustInner.position.set(3.22, 0.05, 0);
    uav.add(exhaustInner);

    // ---- AFTERBURNER EFFECT ----
    const afterburnerGroup = new THREE.Group();
    afterburnerGroup.position.set(3.3, 0.05, 0);
    uav.add(afterburnerGroup);

    // Core flame
    const flameGeo = new THREE.ConeGeometry(0.12, 1.5, 12, 4, true);
    const flameMat = new THREE.MeshBasicMaterial({
      color: 0xff6600,
      transparent: true,
      opacity: 0.7,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending
    });
    const flame = new THREE.Mesh(flameGeo, flameMat);
    flame.rotation.z = -Math.PI / 2;
    flame.position.set(0.75, 0, 0);
    afterburnerGroup.add(flame);

    // Outer glow
    const glowGeo = new THREE.ConeGeometry(0.2, 2.0, 12, 4, true);
    const glowMat = new THREE.MeshBasicMaterial({
      color: 0xff4400,
      transparent: true,
      opacity: 0.3,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending
    });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    glow.rotation.z = -Math.PI / 2;
    glow.position.set(1.0, 0, 0);
    afterburnerGroup.add(glow);

    // Afterburner light
    const abLight = new THREE.PointLight(0xff6600, 2, 6);
    abLight.position.set(0.5, 0, 0);
    afterburnerGroup.add(abLight);

    // ---- PANEL LINES ----
    function createPanelLine(points, yOffset = 0.01) {
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({
        color: 0x444455,
        transparent: true,
        opacity: 0.5
      });
      const line = new THREE.Line(geometry, material);
      line.position.y = yOffset;
      return line;
    }

    // Wing panel lines
    const wingPanel1 = createPanelLine([
      new THREE.Vector3(-0.5, 0, 0.8),
      new THREE.Vector3(1.5, 0, 2.2)
    ], 0.06);
    uav.add(wingPanel1);

    const wingPanel2 = createPanelLine([
      new THREE.Vector3(-0.5, 0, -0.8),
      new THREE.Vector3(1.5, 0, -2.2)
    ], 0.06);
    uav.add(wingPanel2);

    const wingPanel3 = createPanelLine([
      new THREE.Vector3(0.5, 0, 0),
      new THREE.Vector3(2.0, 0, 0)
    ], 0.06);
    uav.add(wingPanel3);

    // Fuselage panel lines
    const fusePanel1 = createPanelLine([
      new THREE.Vector3(-1.5, 0.31, 0),
      new THREE.Vector3(0.5, 0.31, 0)
    ], 0);
    uav.add(fusePanel1);

    const fusePanel2 = createPanelLine([
      new THREE.Vector3(-1.5, -0.31, 0),
      new THREE.Vector3(0.5, -0.31, 0)
    ], 0);
    uav.add(fusePanel2);

    // ---- DETAILS ----
    // Panel hatches
    const hatchGeo = new THREE.PlaneGeometry(0.25, 0.15);
    const hatchMat = new THREE.MeshStandardMaterial({
      color: 0x777788,
      roughness: 0.4,
      metalness: 0.4
    });

    const hatch1 = new THREE.Mesh(hatchGeo, hatchMat);
    hatch1.position.set(0.3, 0.06, 0.6);
    hatch1.rotation.x = -Math.PI / 2;
    hatch1.rotation.z = 0.3;
    uav.add(hatch1);

    const hatch2 = new THREE.Mesh(hatchGeo, hatchMat);
    hatch2.position.set(0.8, 0.06, -0.5);
    hatch2.rotation.x = -Math.PI / 2;
    hatch2.rotation.z = -0.2;
    uav.add(hatch2);

    const hatch3 = new THREE.Mesh(hatchGeo, hatchMat);
    hatch3.position.set(1.3, 0.06, 0.3);
    hatch3.rotation.x = -Math.PI / 2;
    hatch3.rotation.z = 0.1;
    uav.add(hatch3);

    // Rivets
    const rivetGeo = new THREE.SphereGeometry(0.015, 6, 6);
    const rivetMat = new THREE.MeshStandardMaterial({
      color: 0x555566,
      roughness: 0.3,
      metalness: 0.6
    });

    for (let i = 0; i < 20; i++) {
      const rivet = new THREE.Mesh(rivetGeo, rivetMat);
      const t = i / 20;
      rivet.position.set(-1.0 + t * 2.5, 0.32, 0.15 + Math.sin(t * 10) * 0.05);
      uav.add(rivet);
    }

    // ---- GROUND PLANE ----
    const groundGeo = new THREE.PlaneGeometry(30, 30);
    const groundMat = new THREE.ShadowMaterial({ opacity: 0.15 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -2;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(20, 20, 0x222222, 0x111111);
    grid.position.y = -2;
    scene.add(grid);

    // ========== ANIMATION ==========
    let time = 0;
    let afterburnerOn = true;

    function animate() {
      requestAnimationFrame(animate);
      time += 0.016;

      // Afterburner flicker
      if (afterburnerOn) {
        flameMat.opacity = 0.5 + Math.sin(time * 15) * 0.15 + Math.sin(time * 23) * 0.1;
        glowMat.opacity = 0.2 + Math.sin(time * 10) * 0.08;
        abLight.intensity = 1.5 + Math.sin(time * 20) * 0.5;
        flame.scale.set(
          1 + Math.sin(time * 18) * 0.05,
          1,
          1 + Math.sin(time * 14) * 0.05
        );
      } else {
        flameMat.opacity = 0;
        glowMat.opacity = 0;
        abLight.intensity = 0;
      }

      // Subtle hover
      uav.position.y = Math.sin(time * 0.8) * 0.05;
      uav.rotation.z = Math.sin(time * 0.5) * 0.01;

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    // ========== BUTTON HANDLERS ==========
    let wireframeMode = false;
    const btnWireframe = document.getElementById('btn-wireframe');
    const btnAfterburner = document.getElementById('btn-afterburner');
    const btnAuto = document.getElementById('btn-auto');

    btnWireframe.addEventListener('click', () => {
      wireframeMode = !wireframeMode;
      uav.traverse((child) => {
        if (child.isMesh && child.material && child !== ground) {
          child.material.wireframe = wireframeMode;
        }
      });
      btnWireframe.classList.toggle('active-blue', wireframeMode);
    });

    btnAfterburner.addEventListener('click', () => {
      afterburnerOn = !afterburnerOn;
      if (afterburnerOn) {
        btnAfterburner.classList.add('active-orange');
        btnAfterburner.classList.remove('inactive');
        btnAfterburner.textContent = 'Afterburner: ON';
      } else {
        btnAfterburner.classList.remove('active-orange');
        btnAfterburner.classList.add('inactive');
        btnAfterburner.textContent = 'Afterburner: OFF';
      }
    });

    btnAuto.addEventListener('click', () => {
      controls.autoRotate = !controls.autoRotate;
      btnAuto.classList.toggle('active-blue', controls.autoRotate);
    });

    // ========== RESIZE ==========
    window.addEventListener('resize', () => {
      const w = container.clientWidth;
      const h = container.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });
  </script>
</body>
</html>
